<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="https://fonts.cdnfonts.com/css/product-sans" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #080808;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Product Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); line-height: 1.7; overflow-x: hidden; }

        nav {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(3, 5, 8, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .back-home { color: var(--text-dim); text-decoration: none; font-size: 0.9rem; flex: 1; }
        .logo-nav { flex: 1; display: flex; justify-content: center; }
        .logo-nav img { height: 32px; width: auto; }
        .nav-spacer { flex: 1; }

        .container { max-width: 850px; margin: 60px auto; padding: 0 20px; }

        header { text-align: center; margin-bottom: 60px; }
        h1 { font-size: 3.5rem; font-weight: 700; letter-spacing: -2px; margin-bottom: 10px; }
        header p { color: var(--text-dim); font-size: 1.1rem; }

        .warning-box {
            background: #ffffff;
            color: #000000;
            padding: 30px;
            border-radius: 30px;
            margin-bottom: 50px;
            text-align: center;
            font-weight: 600;
        }

        .step-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 40px;
            margin-bottom: 30px;
        }

        .step-label {
            display: inline-block;
            background: rgba(255,255,255,0.05);
            padding: 5px 15px;
            border-radius: 100px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        h2 { font-size: 1.8rem; margin-bottom: 20px; }
        h3 { font-size: 1.2rem; margin: 25px 0 10px; color: #eee; }

        .code-area {
            background: #000;
            padding: 18px;
            border-radius: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #fff;
            margin: 15px 0;
            border: 1px solid var(--border);
        }

        .method-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) { .method-grid { grid-template-columns: 1fr; } }

        .method-box {
            background: rgba(255,255,255,0.02);
            padding: 25px;
            border-radius: 25px;
            border: 1px solid var(--border);
        }

        footer { text-align: center; padding: 60px; color: var(--text-dim); border-top: 1px solid var(--border); margin-top: 60px; }
        strong { color: #fff; }
    </style>
</head>
<body>

    <nav>
        <a href="" class="back-home"></a>
        <div class="logo-nav"><img src="" alt=""></div>
        <div class="nav-spacer"></div>
    </nav>

    <div class="container">
        <header>
            <h1></h1>
            <p></p>
        </header>

        <div class="warning-box"></div>

        <div class="step-card">
            <span class="step-label"></span>
            <h2></h2>
            <p style="color: var(--text-dim);"></p>
            <div class="method-grid">
                <div class="method-box">
                    <strong></strong>
                    <p style="font-size: 0.85rem; color: var(--text-dim); margin-top: 5px;"></p>
                </div>
                <div class="method-box">
                    <strong></strong>
                    <p style="font-size: 0.85rem; color: var(--text-dim); margin-top: 5px;"></p>
                </div>
            </div>
        </div>

        <div class="step-card">
            <span class="step-label"></span>
            <h2></h2>
            <div class="method-grid">
                <div class="method-box">
                    <h3></h3>
                    <div class="code-area"></div>
                    <div class="code-area"></div>
                </div>
                <div class="method-box">
                    <h3></h3>
                    <p style="font-size: 0.85rem; color: var(--text-dim);"></p>
                    <p style="font-size: 0.85rem; margin-top: 10px;"></p>
                    <p style="font-size: 0.85rem;"></p>
                    <p style="font-size: 0.85rem; margin-top: 10px;"></p>
                </div>
            </div>
        </div>

        <div class="step-card">
            <span class="step-label"></span>
            <h2></h2>
            <p style="color: var(--text-dim);"></p>
            <p style="margin-top: 10px;"></p>
            <p></p>
        </div>

        <div class="step-card">
            <span class="step-label"></span>
            <h2></h2>
            <p style="color: var(--text-dim);"></p>
            <div class="code-area"></div>
        </div>

        <div class="step-card">
            <span class="step-label"></span>
            <h2></h2>
            <p style="color: var(--text-dim);"></p>
            <p style="margin-top: 10px;"></p>
        </div>

    </div>

    <footer>
        <p></p>
    </footer>

</body>
</html>
