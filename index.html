<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="https://fonts.cdnfonts.com/css/product-sans" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --subtext: #9a9a9a;
            --border: rgba(255, 255, 255, 0.12);
            --card-bg: #080808;
            --nav-bg: rgba(10, 10, 10, 0.7);
        }

        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Product Sans', sans-serif !important; }

        body { background-color: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; overflow-x: hidden; }

        nav {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1100px;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 10px 35px;
            display: grid;
            grid-template-columns: 1fr auto 1fr; 
            align-items: center;
        }

        .nav-left { display: flex; justify-content: flex-start; }
        .nav-links { display: flex; gap: 20px; font-size: 0.85rem; }
        .nav-links a { color: var(--subtext); cursor: pointer; transition: 0.3s; text-decoration: none; white-space: nowrap; }
        .nav-links a:hover { color: white; }

        .logo-container { display: flex; justify-content: center; align-items: center; }
        .logo-container img { height: 35px; width: auto; display: block; }

        .nav-right { display: flex; justify-content: flex-end; }
        .btn-download {
            background: white; color: black;
            padding: 10px 24px; border-radius: 50px;
            font-size: 0.85rem; text-decoration: none;
            font-weight: bold; transition: 0.3s ease;
        }
        .btn-download:hover { transform: scale(1.05); }

        .hero {
            padding: 220px 10% 140px;
            text-align: center;
            background: radial-gradient(circle at top, #111 0%, #000 70%);
            position: relative;
        }
        .gradient-text {
            background: linear-gradient(180deg, #FFFFFF 0%, #A0A0A0 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; display: inline-block;
        }
        h1 { font-size: clamp(2.5rem, 6vw, 4.2rem); line-height: 1.1; margin-bottom: 30px; font-weight: 400; letter-spacing: -1.5px; }
        .hero p { color: var(--subtext); max-width: 650px; margin: 0 auto 40px; font-size: 1.1rem; line-height: 1.5; }

        .screenshots-section { padding: 120px 5% 100px; border-top: 1px solid var(--border); text-align: center; }
        .screenshot-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; max-width: 1400px; margin: 0 auto; 
        }
        .screen-card { border-radius: 24px; overflow: hidden; border: 1px solid var(--border); background: #050505; transition: 0.4s; }
        .screen-card img { width: 100%; height: auto; display: block; }

        .about-section { padding: 100px 10%; border-top: 1px solid var(--border); text-align: center; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .team-card { background: var(--card-bg); border: 1px solid var(--border); padding: 30px 20px; border-radius: 24px; }
        .team-card img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 15px; object-fit: cover; border: 2px solid var(--border); }

        .section-faq { padding: 100px 10%; max-width: 1000px; margin: 0 auto; border-top: 1px solid var(--border); }
        .faq-grid { display: grid; grid-template-columns: 1fr; gap: 40px; text-align: left; }
        .faq-item h3 { font-size: 1.2rem; margin-bottom: 10px; font-weight: 400; }
        .faq-item p { color: var(--subtext); line-height: 1.6; }

        .features { padding: 100px 10%; border-top: 1px solid var(--border); }
        .features h2 { font-size: 3rem; font-weight: 400; margin-bottom: 50px; text-align: left; }
        .grid-features { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; text-align: left; }
        .feat-card h4 { font-size: 1.3rem; margin-bottom: 12px; font-weight: 400; }
        .feat-card p { color: var(--subtext); font-size: 0.95rem; line-height: 1.6; }

        .cta-container { padding: 60px 10%; }
        .cta-box { 
            background: #080808; border: 1px solid var(--border); border-radius: 32px; 
            padding: 80px 40px; text-align: center; position: relative; overflow: hidden; 
        }
        .cta-box h2 { font-size: 2.2rem; margin-bottom: 30px; font-weight: 400; }

        footer { padding: 60px 20px; text-align: center; border-top: 1px solid var(--border); }
        .social-links { display: flex; justify-content: center; gap: 25px; margin-bottom: 30px; }
        .social-links a { color: var(--text); text-decoration: none; font-size: 0.9rem; opacity: 0.6; transition: 0.3s; }
        .social-links a:hover { opacity: 1; }

        @media (max-width: 900px) { 
            .nav-left { display: none; } 
            nav { grid-template-columns: 1fr 1fr; } 
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <div class="nav-links">
                <a href=""></a>
                <a href=""></a>
                <a href=""></a>
            </div>
        </div>
        <div class="logo-container">
            <img src="" alt="">
        </div>
        <div class="nav-right">
            <a href="" class="btn-download"></a>
        </div>
    </nav>

    <section class="hero">
        <h1 class="gradient-text"></h1>
        <p></p>
        <a href="" class="btn-download" style="padding: 16px 45px; font-size: 1rem;"></a> 
    </section>

    <section class="screenshots-section">
        <h2 style="font-size: 2.8rem; margin-bottom: 50px; font-weight: 400;"></h2>
        <div class="screenshot-grid">
            <div class="screen-card"><img src="" alt=""></div>
            <div class="screen-card"><img src="" alt=""></div>
            <div class="screen-card"><img src="" alt=""></div>
        </div>
    </section>

    <section class="about-section">
        <h2 style="font-size: 2.8rem; margin-bottom: 50px; font-weight: 400;"></h2>
        <div class="team-grid">
            <div class="team-card">
                <img src="" alt="">
                <h4></h4>
                <p></p>
            </div>
        </div>
    </section>

    <section class="section-faq">
        <h2 style="text-align: center; font-size: 2.8rem; margin-bottom: 60px; font-weight: 400;"></h2>
        <div class="faq-grid">
            <div class="faq-item">
                <h3></h3>
                <p></p>
            </div>
        </div>
    </section>

    <section class="features">
        <h2><span style="opacity: 0.3;"></span></h2>
        <div class="grid-features">
            <div class="feat-card">
                <h4></h4>
                <p></p>
            </div>
        </div>
    </section>

    <div class="cta-container">
        <div class="cta-box">
            <h2><br><b></b></h2>
            <a href="" class="btn-download" style="padding: 15px 45px; font-size: 1rem;"></a> 
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="" target="_blank"></a>
            <a href="" target="_blank"></a>
        </div>
        <p style="color: #555; font-size: 0.8rem;"></p>
    </footer>

</body>
</html>
