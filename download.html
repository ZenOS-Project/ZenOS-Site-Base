<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link href="https://fonts.cdnfonts.com/css/product-sans" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #080808;
            --border: rgba(255, 255, 255, 0.08);
            --accent-gray: #e0e0e0;
            --text-main: #ffffff;
            --text-dim: #ffffff;
            --nav-bg: rgba(10, 10, 10, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Product Sans', sans-serif !important; }
        body { background-color: var(--bg); color: var(--text-main); line-height: 1.6; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        nav {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1100px;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 10px 35px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
        }

        .nav-left { display: flex; justify-content: flex-start; }
        .back-home { color: var(--text-dim); text-decoration: none; font-size: 0.85rem; transition: 0.3s; }
        .back-home:hover { color: white; }

        .logo-nav { display: flex; justify-content: center; align-items: center; }
        .logo-nav img { height: 32px; width: auto; }

        .nav-right { display: flex; justify-content: flex-end; }

        header { text-align: center; padding: 180px 20px 40px; }
        h1 { font-size: 3.5rem; font-weight: 400; margin-bottom: 10px; letter-spacing: -1.5px; }
        h1 span { color: var(--text-dim); font-weight: 400; }

        .search-box { max-width: 500px; margin: 30px auto; position: relative; }
        .search-box input {
            width: 100%;
            padding: 18px 30px;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .search-box input:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.05); }

        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 60px;
            flex-wrap: wrap;
            padding: 0 5%;
        }
        .filter-btn {
            padding: 10px 22px;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
        .filter-btn.active { background: white; color: black; border-color: white; }
        .filter-btn:hover:not(.active) { border-color: white; color: white; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 0 5% 100px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 450px;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .card:hover { transform: translateY(-10px); border-color: rgba(255,255,255,0.2); background: #0c1016; }
        .card.hidden { display: none; }
        
        .card img { height: 180px; width: auto; max-width: 100%; object-fit: contain; margin-bottom: 25px; }
        
        .device-name { font-size: 1.3rem; font-weight: 400; color: white; margin-bottom: 5px; }
        .codename { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 30px; display: block; font-family: monospace; opacity: 0.6; }

        .btn-download {
            width: 100%;
            padding: 14px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 16px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
            cursor: pointer;
        }
        .btn-download:hover { transform: scale(1.02); background: #f0f0f0; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: #0a0a0a;
            border: 1px solid var(--border);
            padding: 50px 40px;
            border-radius: 32px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: scale(0.9);
            transition: 0.3s;
        }
        .modal-overlay.active { display: flex; }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-content h2 { font-size: 2.5rem; margin-bottom: 15px; }
        .btn-close {
            padding: 12px 40px;
            background: white; color: black;
            border: none; border-radius: 50px;
            font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        footer { text-align: center; padding: 60px; color: #444; border-top: 1px solid var(--border); font-size: 0.8rem; }

        @media (max-width: 900px) { 
            .nav-left { display: none; } 
            nav { grid-template-columns: 1fr 1fr; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="" class="back-home"></a>
        </div>
        <div class="logo-nav"><img src="" alt=""></div>
        <div class="nav-right"></div>
    </nav>

    <header>
        <h1><span></span></h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="">
        </div>
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all"></button>
            <button class="filter-btn" data-filter="brand1"></button>
            <button class="filter-btn" data-filter="brand2"></button>
            <button class="filter-btn" data-filter="brand3"></button>
        </div>
    </header>

    <div class="grid" id="deviceGrid">
        <div class="card" data-brand="brand1">
            <div class="card-top">
                <img src="" alt="">
                <h3 class="device-name"></h3>
                <span class="codename"></span>
            </div>
            <a class="btn-download"></a>
        </div>
    </div>
    
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h2></h2>
            <p></p>
            <button class="btn-close" id="btnClose"></button>
        </div>
    </div>

    <footer><p></p></footer>

    <script>
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const cards = document.querySelectorAll('.card');
        const modal = document.getElementById('modalOverlay');
        const btnClose = document.getElementById('btnClose');

        function applyFilters() {
            const query = searchInput.value.toLowerCase();
            const activeFilter = document.querySelector('.filter-btn.active').getAttribute('data-filter');
            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                const brand = card.getAttribute('data-brand');
                const matchesSearch = text.includes(query);
                const matchesBrand = activeFilter === 'all' || brand === activeFilter;
                card.classList.toggle('hidden', !(matchesSearch && matchesBrand));
            });
        }

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilters();
            });
        });

        searchInput.addEventListener('input', applyFilters);

        document.querySelectorAll('.btn-download').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                modal.classList.add('active');
            });
        });

        btnClose.addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
    </script>
</body>
</html>
